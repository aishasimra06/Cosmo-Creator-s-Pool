# ==============================
# Application Config
# ==============================
spring.application.name=creator-hub-backend
server.port=8080

# ==============================
# MySQL DataSource
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3306/creator_hub?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# JPA / Hibernate
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ==============================
# JWT Configuration
# ==============================
app.jwt.secret=CreatorHubSuperSecretKeyThatIsAtLeast256BitsLongForHS256AlgorithmSecurity2024!
app.jwt.expiration=86400000

# ==============================
# Cloudinary Configuration
# ==============================
cloudinary.cloud-name=drvb9m6z5
cloudinary.api-key=757567543555168
cloudinary.api-secret=PtP7HDgzWYZXtk4Knk9OIMS6Y9I

# ==============================
# Multipart File Upload
# ==============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# ==============================
# CORS (handled in SecurityConfig)
# ==============================
app.cors.allowed-origins=http://localhost:5173

# ==============================
# Swagger / OpenAPI
# ==============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ==============================
# Logging
# ==============================
logging.level.com.creatorhub=DEBUG
logging.level.org.springframework.security=WARN
